name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── JDK ───────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Cache: Gradle wrapper ──────────────────────────────────
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-

      # ── Cache: Gradle dependencies ─────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
          key: gradle-deps-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-deps-

      # ── Permissions ───────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Build Debug ───────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assemblePlaystoreDebug --build-cache --parallel

      # ── Build Release APK ─────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assemblePlaystoreRelease --build-cache --parallel

      # ── Sign APK ──────────────────────────────────────────────
      - name: Sign Release APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/playstore/release
          signingKeyBase64: ${{ secrets.RELEASE_KEYSTORE }}
          alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.RELEASE_KEY_PASSWORD }}

      # ── Upload Debug APK ──────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/playstore/debug/app-playstore-debug.apk
          retention-days: 7

      # ── Upload Signed Release APK ─────────────────────────────
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-playstore-release-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 7

      # ── Cleanup keystore ──────────────────────────────────────
      - name: Remove keystore
        if: always()
        run: rm -f keystore.jks